name: DEV Cluster - Terraform Apply

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ vars.ENVIRONMENT_STAGE }}

    env:
      REGION: ${{ vars.REGION }}
      ENV_NAME: ${{ vars.ENV_NAME }}
      OIDC_INFRA_ROLE: ${{ secrets.OIDC_INFRA_ROLE }}
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      REMOTE_STATE_BUCKET_NAME: ${{ secrets.REMOTE_STATE_BUCKET_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 Detect changed Terraform directories
      - name: Detect Modified Terraform Directories
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE_COMMIT="HEAD~1"
          else
            BASE_COMMIT=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGED_FILES=$(git diff --name-only $BASE_COMMIT...HEAD)

          INFRA_DIRS=$(echo "$CHANGED_FILES" \
            | grep -E '^infra/.+\.(tf|tfvars)$' \
            | xargs -I {} dirname {} \
            | xargs -I {} bash -c 'd={}; while [[ $d != "." && $d != "infra" ]]; do echo $d; d=$(dirname $d); done' \
            | grep -v '^infra$' \
            | sort -u || true)

          if [[ -n "$INFRA_DIRS" ]]; then
            echo "INFRA_CHANGED=true" >> $GITHUB_ENV
            echo "INFRA_DIRS=$(echo "$INFRA_DIRS" | tr '\n' ' ')" >> $GITHUB_ENV
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: env.INFRA_CHANGED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_INFRA_ROLE }}
          aws-region: ${{ env.REGION }}

      - name: Setup remote state backend
        if: env.INFRA_CHANGED == 'true'
        run: |
          chmod +x infra/remote-state-backend/run.sh
          ./infra/remote-state-backend/run.sh --account ${{ env.ACCOUNT_ID }} --region ${{ env.REGION }} --bucket ${{ secrets.REMOTE_STATE_BUCKET_NAME }}
      
      # 🚀 APPLY
      - name: Run Terraform Apply (ordered)
        if: env.INFRA_CHANGED == 'true'
        run: |
          MODULES=$(grep -v '^#' infra/setup-order.txt | tr '\n' ' ')

          for module in $MODULES; do
            FULL_PATH="infra/$module"

            if [[ " $INFRA_DIRS " =~ " $FULL_PATH " ]]; then
              echo "🚀 Applying Module: $FULL_PATH"
              
              # Use the module path as the prefix for the state key
              REMOTE_STATE_KEY="${module}/terraform.tfstate"
              
              echo "📊 State Key: $REMOTE_STATE_KEY"
              echo "--------------------------------------------------------"

              cd $FULL_PATH
              
              terraform init \
                -backend-config="bucket=${{ env.REMOTE_STATE_BUCKET_NAME }}" \
                -backend-config="region=${{ env.REGION }}" \
                -backend-config="key=${REMOTE_STATE_KEY}" \
                -reconfigure

              terraform validate

              # Check for environment-specific var file
              VAR_FILE="env/${{ env.ENV_NAME }}.tfvars"
              if [[ -f "$VAR_FILE" ]]; then
                echo "📊 Using var-file: $VAR_FILE"
                terraform plan -var-file="$VAR_FILE" -out=tfplan
                terraform apply -auto-approve tfplan
              else
                echo "ℹ️ No environment-specific var-file found at $VAR_FILE. Running standard apply."
                terraform plan -out=tfplan
                terraform apply -auto-approve tfplan
              fi
               
               cd -
            fi
          done

      - name: No changes detected
        if: env.INFRA_CHANGED != 'true'
        run: echo "No Terraform changes detected."