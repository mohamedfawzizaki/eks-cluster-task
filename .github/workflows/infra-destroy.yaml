name: DEV Cluster - Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "EKS Cluster Name"
        required: true
        default: "zaki-eks-task"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ vars.ENVIRONMENT_STAGE }}

    env:
      REGION: ${{ vars.REGION }}
      ENV_NAME: ${{ vars.ENV_NAME }}
      OIDC_INFRA_ROLE: ${{ secrets.OIDC_INFRA_ROLE }}
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

    steps:
      # 📥 Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 🔐 AWS Auth (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_INFRA_ROLE }}
          aws-region: ${{ env.REGION }}

      # 🔧 Install kubectl (needed for cleanup script)
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # 🔥 Run cleanup script
      - name: Run EKS Cleanup Script
        run: |
          echo "======================================"
          echo "Running cleanup script before destroy"
          echo "======================================"

          chmod +x infra/scripts/cleanup.sh

          export CLUSTER_NAME="${{ github.event.inputs.cluster_name }}"
          export AWS_REGION="${{ env.REGION }}"

          ./infra/scripts/cleanup.sh

      # 💣 Destroy in reverse order
      - name: Run Terraform Destroy (ordered)
        run: |
          echo "======================================"
          echo "Starting Terraform Destroy"
          echo "======================================"

          BUCKET="${{ env.ACCOUNT_ID }}-${{ env.REMOTE_STATE_BUCKET_PREFIX }}"

          if [ ! -f infra/setup-order.txt ]; then
            echo "❌ setup-order.txt not found"
            exit 1
          fi

          # Read setup-order.txt in reverse using tac
          tac infra/setup-order.txt | while read -r module_path || [ -n "$module_path" ]; do
            # Skip comments and empty lines
            [[ "$module_path" =~ ^#.*$ || -z "$module_path" ]] && continue

            FULL_PATH="infra/$module_path"

            if [ -d "$FULL_PATH" ]; then
              echo "--------------------------------------------------------"
              echo "🔥 Destroying Module: $FULL_PATH"
              
              # Use the module path as the prefix for the state key
              REMOTE_STATE_KEY="${module_path}/terraform.tfstate"
              
              echo "📊 State Key: $REMOTE_STATE_KEY"
              echo "--------------------------------------------------------"

              cd $FULL_PATH
              
              terraform init \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="region=${{ env.REGION }}" \
                -backend-config="key=${REMOTE_STATE_KEY}" \
                -reconfigure

              # Check for environment-specific var file
              VAR_FILE="env/${{ env.ENV_NAME }}.tfvars"
              if [[ -f "$VAR_FILE" ]]; then
                echo "📊 Using var-file: $VAR_FILE"
                terraform destroy -var-file="$VAR_FILE" -auto-approve
              else
                echo "ℹ️ No environment-specific var-file found at $VAR_FILE. Running standard destroy."
                terraform destroy -auto-approve
              fi
              
              cd -
            else
              echo "Skipping $FULL_PATH (not found)"
            fi
          done

      # ✅ Done
      - name: Finished
        run: echo "🔥 Full infrastructure destroyed successfully"